<svg xmlns="http://www.w3.org/2000/svg" width="642" height="657" viewBox="0 0 642 657" role="img" aria-labelledby="title desc">
  <title id="title">Binance Futures Testnet Bot UI Preview</title>
  <desc id="desc">Illustrative preview of the Binance Futures Testnet Bot desktop interface showing SELL market order fields and a successful response panel.</desc>
  <rect width="642" height="657" fill="#f3f3f3"/>
  <rect x="0.5" y="0.5" width="641" height="656" fill="#ffffff" stroke="#d0d0d0"/>
  <rect x="0" y="0" width="642" height="34" fill="#f2f4f7"/>
  <text x="28" y="22" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#1c1c1c">Binance Futures Testnet Bot</text>
  <circle cx="13" cy="17" r="7" fill="#6a88c9"/>
  <text x="24" y="59" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#111111">Binance Futures Testnet Order</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#222222">
    <text x="24" y="111">Side</text>
    <text x="24" y="151">Order Type</text>
    <text x="24" y="191">Symbol</text>
    <text x="24" y="231">Quantity</text>
    <text x="24" y="271">Price</text>
    <text x="24" y="311">Stop Price</text>
    <text x="24" y="445">Response</text>
  </g>

  <g font-family="Consolas, monospace" font-size="13" fill="#222222">
    <rect x="102" y="92" width="520" height="26" fill="#ffffff" stroke="#c7c7c7"/>
    <text x="108" y="110">SELL</text>
    <text x="606" y="110">▾</text>

    <rect x="102" y="132" width="520" height="26" fill="#ffffff" stroke="#c7c7c7"/>
    <text x="108" y="150">MARKET</text>
    <text x="606" y="150">▾</text>

    <rect x="102" y="172" width="520" height="26" fill="#ffffff" stroke="#c7c7c7"/>
    <text x="108" y="190">BTCUSDT</text>

    <rect x="102" y="212" width="520" height="26" fill="#ffffff" stroke="#c7c7c7"/>
    <text x="108" y="230">0.001</text>

    <rect x="102" y="252" width="520" height="26" fill="#fbfbfb" stroke="#e2e2e2"/>
    <rect x="102" y="292" width="520" height="26" fill="#fbfbfb" stroke="#e2e2e2"/>

    <rect x="24" y="350" width="598" height="28" fill="#fafafa" stroke="#7a7a7a" stroke-dasharray="1 2"/>
    <text x="283" y="369">Place Order</text>

    <rect x="24" y="458" width="598" height="183" fill="#ffffff" stroke="#c7c7c7"/>
    <text x="28" y="479">Order placed successfully</text>
    <text x="28" y="499">Order ID: 13062243546</text>
    <text x="28" y="519">Status: NEW</text>
    <text x="28" y="539">Executed Qty: 0.0000</text>
    <text x="28" y="559">Avg Price: 0.00</text>
  </g>
</svg>
